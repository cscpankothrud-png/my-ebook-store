<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>My Ebook</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 80px auto; text-align: center; }
  h1 { font-size: 1.6rem; }
  button {
    margin-top: 24px; padding: 14px 28px; font-size: 1rem;
    background: #111; color: #fff; border: none; border-radius: 8px; cursor: pointer;
  }
  button:hover { background: #333; }
  button:disabled { opacity: 0.6; cursor: default; }
</style>
</head>
<body>
  <h1>My Ebook</h1>
  <p>Instant download after purchase — delivered automatically to your inbox.</p>
  <button id="buyBtn">Buy Now — $9</button>

  <script>
    document.getElementById('buyBtn').addEventListener('click', async (e) => {
      e.target.disabled = true;
      e.target.textContent = 'Redirecting to checkout...';
      const res = await fetch('/create-checkout-session', { method: 'POST' });
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        alert('Something went wrong. Please try again.');
        e.target.disabled = false;
        e.target.textContent = 'Buy Now — $9';
      }
    });
  </script>
</body>
</html>
